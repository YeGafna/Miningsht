<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Factory Evolution</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* Inventar Oben Links */
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(10, 15, 20, 0.85); padding: 15px; border-radius: 12px; border: 1px solid #00d4ff; pointer-events: none; backdrop-filter: blur(8px); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,212,255,0.2); }
        .res-col { display: flex; flex-direction: column; gap: 5px; }
        .res-val { color: #fff; font-family: monospace; font-size: 1.1em; background: #222; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }
        .t-iron { color: #a5c4d4; } /* Eisen Farbe */
        .t-copper { color: #e68a5c; } /* Kupfer Farbe */
        
        /* System Menü Oben Rechts */
        #sysMenu { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; }
        .sys-btn { padding: 8px 12px; background: #222; color: white; border: 1px solid #555; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .sys-btn:active { background: #444; }
        
        /* Toolbar Unten */
        #toolbar-container { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; width: 95%; max-width: 600px; }
        .toolbar-row { display: flex; gap: 6px; justify-content: center; background: rgba(20,20,20,0.9); padding: 10px; border-radius: 12px; border: 1px solid #444; flex-wrap: wrap; }
        .btn { padding: 12px; background: #2a2a2a; color: #ccc; border: 2px solid #333; border-radius: 8px; font-size: 12px; font-weight: bold; flex: 1; min-width: 60px; text-align: center; }
        .btn.selected { background: #00d4ff; color: #000; border-color: #fff; box-shadow: 0 0 10px #00d4ff; }
        .btn-dir { font-size: 18px; padding: 8px; min-width: 50px; background: #1a1a1a; }
        .btn-dir.selected { background: #ffeb3b; color: #000; box-shadow: 0 0 10px #ffeb3b; }
        
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="res-col t-iron">
            <div>Fe-Erz: <span id="res-fe_ore" class="res-val">0</span></div>
            <div>Fe-Barren: <span id="res-fe_ingot" class="res-val">10</span></div>
            <div>Fe-Platte: <span id="res-fe_plate" class="res-val">0</span></div>
        </div>
        <div class="res-col t-copper">
            <div>Cu-Erz: <span id="res-cu_ore" class="res-val">0</span></div>
            <div>Cu-Barren: <span id="res-cu_ingot" class="res-val">10</span></div>
            <div>Cu-Kabel: <span id="res-cu_wire" class="res-val">0</span></div>
        </div>
    </div>
    
    <div id="sysMenu">
        <button class="sys-btn" onclick="exportCode()" style="border-color: #007bff;">Code Export</button>
        <button class="sys-btn" onclick="importCode()" style="border-color: #28a745;">Code Import</button>
        <button class="sys-btn" onclick="clearSave()" style="border-color: #dc3545; color: #ff6b6b;">RESET</button>
    </div>
    
    <div id="toolbar-container">
        <div class="toolbar-row">
            <button class="btn btn-dir" id="dir-3">⬆️</button>
            <button class="btn btn-dir selected" id="dir-0">➡️</button>
            <button class="btn btn-dir" id="dir-1">⬇️</button>
            <button class="btn btn-dir" id="dir-2">⬅️</button>
        </div>
        <div class="toolbar-row">
            <button class="btn selected" id="btn-belt">Band</button>
            <button class="btn" id="btn-miner_fe">Fe-Miner</button>
            <button class="btn" id="btn-miner_cu">Cu-Miner</button>
            <button class="btn" id="btn-smelter">Ofen</button>
            <button class="btn" id="btn-constructor">Fabrik</button>
            <button class="btn" id="btn-delete" style="background: #521; color:#f55;">X</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 70;
        
        // 0: Rechts, 1: Unten, 2: Links, 3: Oben
        const dx = [1, 0, -1, 0];
        const dy = [0, 1, 0, -1];
        
        let buildDir = 0; 
        let mode = 'belt';
        let grid = {};
        
        let resources = {
            fe_ore: 0, fe_ingot: 20, fe_plate: 0,
            cu_ore: 0, cu_ingot: 20, cu_wire: 0
        };

        if(localStorage.getItem('factoryV2')) {
            try {
                const data = JSON.parse(localStorage.getItem('factoryV2'));
                grid = data.grid || {}; resources = data.resources || resources;
            } catch(e) {}
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- BEDIENUNG ---
        document.querySelectorAll('.btn-dir').forEach(btn => {
            btn.onclick = () => {
                buildDir = parseInt(btn.id.split('-')[1]);
                document.querySelectorAll('.btn-dir').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
        });

        document.querySelectorAll('.btn:not(.btn-dir)').forEach(btn => {
            btn.onclick = () => {
                mode = btn.id.replace('btn-', '');
                document.querySelectorAll('.btn:not(.btn-dir)').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
        });

        canvas.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientY > window.innerHeight - 150) return; // Toolbar Schutz
            if(e.touches[0].clientY < 120 && e.touches[0].clientX > window.innerWidth - 120) return; // Menü Schutz

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.touches[0].clientX - rect.left) / tileSize);
            const y = Math.floor((e.touches[0].clientY - rect.top) / tileSize);
            const key = `${x},${y}`;

            if (mode === 'delete') {
                delete grid[key];
            } else if (!grid[key]) {
                const cost = mode === 'belt' ? 1 : 5; // Band=1, Gebäude=5 Barren
                // Für Gebäude nehmen wir bevorzugt Eisenbarren, wenn leer dann Kupfer
                if (resources.fe_ingot >= cost) {
                    resources.fe_ingot -= cost;
                    placeBuilding(key, mode, buildDir);
                } else if (resources.cu_ingot >= cost) {
                    resources.cu_ingot -= cost;
                    placeBuilding(key, mode, buildDir);
                }
            }
            saveGame();
        });

        function placeBuilding(key, type, dir) {
            if(type === 'belt') grid[key] = { type, dir, items: [] };
            else grid[key] = { type, dir, input: null, timer: 0 };
        }

        // --- SYSTEM ---
        function exportCode() {
            const str = btoa(encodeURIComponent(JSON.stringify({ grid, resources })));
            prompt("Kopiere deinen Fabrik-Code:", str);
        }
        function importCode() {
            const str = prompt("Code einfügen:");
            if(!str) return;
            try {
                const data = JSON.parse(decodeURIComponent(atob(str)));
                grid = data.grid; resources = data.resources; saveGame(); alert("Geladen!");
            } catch(e) { alert("Code ungültig!"); }
        }
        function saveGame() { localStorage.setItem('factoryV2', JSON.stringify({ grid, resources })); }
        function clearSave() { if(confirm("Reset?")) { localStorage.removeItem('factoryV2'); location.reload(); } }
        setInterval(saveGame, 5000);

        // --- GRAFIK HILFSFUNKTIONEN ---
        function drawItem(type, x, y) {
            ctx.shadowBlur = 5; ctx.shadowColor = '#000';
            if(type === 'fe_ore') { ctx.fillStyle='#8ca3a3'; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill(); }
            if(type === 'cu_ore') { ctx.fillStyle='#b87333'; ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill(); }
            if(type === 'fe_ingot') { ctx.fillStyle='#e0e0e0'; ctx.fillRect(x-8, y-5, 16, 10); }
            if(type === 'cu_ingot') { ctx.fillStyle='#ffb380'; ctx.fillRect(x-8, y-5, 16, 10); }
            if(type === 'fe_plate') { ctx.fillStyle='#99aab5'; ctx.fillRect(x-9, y-9, 18, 18); ctx.fillStyle='#2c2f33'; ctx.fillRect(x-3, y-3, 6, 6); }
            if(type === 'cu_wire') { ctx.strokeStyle='#ffd700'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI); ctx.stroke(); }
            ctx.shadowBlur = 0;
        }

        function drawDirection(x, y, dir, isBelt) {
            ctx.fillStyle = isBelt ? "rgba(0, 212, 255, 0.5)" : "rgba(255, 255, 255, 0.3)";
            ctx.save();
            ctx.translate(x + tileSize/2, y + tileSize/2);
            ctx.rotate(dir * Math.PI / 2);
            ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(-5, 8); ctx.lineTo(-5, -8); ctx.fill();
            ctx.restore();
        }

        // --- GAME LOOP ---
        function gameLoop() {
            ctx.fillStyle = "#161b22"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Raster
            ctx.strokeStyle = "#21262d"; ctx.lineWidth = 2;
            for(let x=0; x<canvas.width; x+=tileSize) ctx.strokeRect(x, 0, 0, canvas.height);
            for(let y=0; y<canvas.height; y+=tileSize) ctx.strokeRect(0, y, canvas.width, 0);

            for (let key in grid) {
                const [cx, cy] = key.split(',').map(Number);
                const obj = grid[key];
                const x = cx * tileSize; const y = cy * tileSize;

                // Gebäude Zeichnen
                ctx.fillStyle = "#2d333b"; ctx.fillRect(x+2, y+2, tileSize-4, tileSize-4);

                if (obj.type.startsWith('miner')) {
                    ctx.fillStyle = obj.type === 'miner_fe' ? "#8ca3a3" : "#b87333";
                    ctx.beginPath(); ctx.arc(x+tileSize/2, y+tileSize/2, tileSize/3, 0, Math.PI*2); ctx.fill();
                    
                    obj.timer++;
                    if(obj.timer > 90) {
                        const nextKey = `${cx+dx[obj.dir]},${cy+dy[obj.dir]}`;
                        const resType = obj.type === 'miner_fe' ? 'fe_ore' : 'cu_ore';
                        if(grid[nextKey] && grid[nextKey].type === 'belt') grid[nextKey].items.push({t: resType, p: 0});
                        else resources[resType]++;
                        obj.timer = 0;
                    }
                }

                if (obj.type === 'smelter') {
                    ctx.fillStyle = "#ff5722"; ctx.fillRect(x+15, y+15, tileSize-30, tileSize-30);
                    if(obj.input) {
                        ctx.fillStyle = "#ffeb3b"; ctx.fillRect(x+20, y+20, tileSize-40, tileSize-40); // Feuer-Effekt
                        obj.timer++;
                        if(obj.timer > 120) {
                            const outType = obj.input === 'fe_ore' ? 'fe_ingot' : (obj.input === 'cu_ore' ? 'cu_ingot' : null);
                            obj.input = null; obj.timer = 0;
                            if(outType) {
                                const nextKey = `${cx+dx[obj.dir]},${cy+dy[obj.dir]}`;
                                if(grid[nextKey] && grid[nextKey].type === 'belt') grid[nextKey].items.push({t: outType, p: 0});
                                else resources[outType]++;
                            }
                        }
                    }
                }

                if (obj.type === 'constructor') {
                    ctx.fillStyle = "#00bcd4"; ctx.fillRect(x+10, y+10, tileSize-20, tileSize-20);
                    ctx.fillStyle = "#fff"; ctx.font = "10px sans-serif"; ctx.fillText("FABRIK", x+15, y+35);
                    if(obj.input) {
                        obj.timer++;
                        if(obj.timer > 150) {
                            const outType = obj.input === 'fe_ingot' ? 'fe_plate' : (obj.input === 'cu_ingot' ? 'cu_wire' : null);
                            obj.input = null; obj.timer = 0;
                            if(outType) {
                                const nextKey = `${cx+dx[obj.dir]},${cy+dy[obj.dir]}`;
                                if(grid[nextKey] && grid[nextKey].type === 'belt') grid[nextKey].items.push({t: outType, p: 0});
                                else resources[outType]++;
                            }
                        }
                    }
                }

                if (obj.type === 'belt') {
                    ctx.fillStyle = "#111"; ctx.fillRect(x+10, y+10, tileSize-20, tileSize-20);
                    drawDirection(x, y, obj.dir, true);
                    
                    obj.items.forEach((item, i) => {
                        item.p += 0.025; // Speed
                        // Berechne echte Pixel-Position anhand der Richtung
                        let drawX = x + tileSize/2; let drawY = y + tileSize/2;
                        if(obj.dir === 0) drawX = x + item.p * tileSize;
                        if(obj.dir === 1) drawY = y + item.p * tileSize;
                        if(obj.dir === 2) drawX = x + tileSize - (item.p * tileSize);
                        if(obj.dir === 3) drawY = y + tileSize - (item.p * tileSize);
                        
                        drawItem(item.t, drawX, drawY);

                        if (item.p >= 1) {
                            const nextKey = `${cx+dx[obj.dir]},${cy+dy[obj.dir]}`;
                            if (grid[nextKey]) {
                                const nextObj = grid[nextKey];
                                if (nextObj.type === 'belt') nextObj.items.push({...item, p: 0});
                                else if (nextObj.type === 'smelter' && item.t.includes('ore') && !nextObj.input) nextObj.input = item.t;
                                else if (nextObj.type === 'constructor' && item.t.includes('ingot') && !nextObj.input) nextObj.input = item.t;
                                else resources[item.t]++; // Zurück ins Inventar wenn voll
                            } else { resources[item.t]++; }
                            obj.items.splice(i, 1);
                        }
                    });
                } else {
                    drawDirection(x, y, obj.dir, false); // Zeige Ausgangsrichtung der Gebäude
                }
            }

            // Update UI Zahlen
            for(let key in resources) {
                const el = document.getElementById('res-' + key);
                if(el) el.innerText = resources[key];
            }
            
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
